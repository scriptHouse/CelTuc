name: Deploy CelTuc

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: celtuc-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  DEPLOY_HOST: 38.105.209.147
  DEPLOY_USER: root
  DEPLOY_PATH: /var/www/celtuc
  DEPLOY_URL: https://celtuc.scripthouse.com.ar

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://celtuc.scripthouse.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.CONTABO_SSH_PRIVATE_KEY }}" > ~/.ssh/contabo-deploy
          chmod 600 ~/.ssh/contabo-deploy
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          # Keepalive: el build remoto (docker build → npm install) puede quedarse
          # callado varios minutos. Sin esto la conexión SSH se cae con
          # "client_loop: send disconnect: Broken pipe" (exit 255). Estas opciones
          # mantienen viva la sesión y aplican a TODAS las conexiones (también rsync).
          printf '%s\n' \
            'Host *' \
            '  ServerAliveInterval 30' \
            '  ServerAliveCountMax 20' \
            '  TCPKeepAlive yes' \
            '  ConnectTimeout 30' \
            > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Preflight server
        shell: bash
        run: |
          set -euo pipefail
          # El .env (secretos + DATABASE_URL) vive solo en el servidor. Si falta,
          # cortamos antes de desplegar un backend que no podria arrancar.
          ssh -i ~/.ssh/contabo-deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "test -d '$DEPLOY_PATH' && test -f '$DEPLOY_PATH/.env' && docker compose version"

      - name: Sync project files
        shell: bash
        run: |
          set -euo pipefail
          # --delete mantiene el server igual al repo, pero excluimos lo que solo
          # vive en el servidor (.env) o se genera en runtime, para no borrarlo.
          rsync -az --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.vscode/' \
            --exclude='.env' \
            --exclude='backend/.env' \
            --exclude='backend/.venv/' \
            --exclude='backend/db.sqlite3' \
            --exclude='backend/staticfiles/' \
            --exclude='frontend/node_modules/' \
            --exclude='frontend/dist/' \
            --exclude='frontend/*.tsbuildinfo' \
            --exclude='*.log' \
            -e "ssh -i ~/.ssh/contabo-deploy" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Build and restart
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/contabo-deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && chmod +x deploy.sh deploy/entrypoint.sh && ./deploy.sh"

      - name: Verify container
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/contabo-deploy "$DEPLOY_USER@$DEPLOY_HOST" \
            "for i in \$(seq 1 24); do
              status=\$(docker inspect -f '{{.State.Health.Status}}' celtuc 2>/dev/null || true)
              docker ps --filter name=celtuc --format 'table {{.Names}}\t{{.Status}}'
              if [ \"\$status\" = healthy ]; then
                docker exec celtuc curl -fsS http://127.0.0.1/api/health/
                exit 0
              fi
              sleep 5
            done
            docker logs --tail=120 celtuc
            exit 1"

      - name: Verify public URL
        shell: bash
        run: |
          set -euo pipefail
          # Tras reiniciar, Traefik tarda unos segundos en registrar el backend.
          # Reintentamos /api/health/ (backend) en vez de fallar al primer intento.
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "$DEPLOY_URL/api/health/" || true)
            if [ "$code" = "200" ]; then
              echo "OK ($code): $DEPLOY_URL/api/health/"
              exit 0
            fi
            echo "intento $i/20: $DEPLOY_URL/api/health/ devolvio '$code'; reintento en 5s..."
            sleep 5
          done
          echo "ERROR: $DEPLOY_URL/api/health/ no devolvio 200 tras 20 intentos."
          exit 1
